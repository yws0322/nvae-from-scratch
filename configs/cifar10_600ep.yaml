# CIFAR-10 1x30, 600 epochs. Same architecture as cifar10.yaml; lr tuned down from paper values.

model:
  input_channels: 3
  input_size: 32
  initial_channels: 128
  num_scales: 1
  num_groups_per_scale: 30
  is_adaptive: false
  min_groups_per_scale: 1
  num_prepost_blocks: 1
  num_prepost_cells: 2
  num_cells_per_group: 2
  num_latent_per_group: 20
  num_logistic_mixtures: 10
  use_se: true
  res_dist: true

training:
  epochs: 600
  batch_size: 32
  base_lr: 0.001
  lr_min: 0.0005
  warmup_epochs: 5
  kl_anneal_portion: 0.3
  kl_const_portion: 0.0001
  weight_decay_norm: 0.1
  bn_weight_decay: 0.01
  grad_clip: 200.0
  optimizer: adamax
  weight_decay: 0.0003
